title: Markdown Image Exfiltration Pattern
id: e6e58cd1-d05a-5512-b3fb-3b6a38784ad9
status: stable
description: |
  Detects markdown image syntax with encoded data in URL parameters that
  may indicate data exfiltration attempts through image URLs. Commonly used
  in prompt injection attacks to steal sensitive information.
references:
  - https://attack.mitre.org/techniques/T1041/
  - https://attack.mitre.org/techniques/T1048/
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://embracethered.com/blog/posts/2024/claude-computer-use-c2-the-spaiware/
author: AgentShield (adapted by Netzilo)
date: "2026-02-16"
modified: "2026-02-24"
tags:
  - attack.exfiltration
  - attack.t1041
  - attack.t1048
logsource:
  product: ai_agent
  # Adapted: original used event_type: output_generation (unsupported).
  # llm_response is where model-generated content with exfil patterns appears.
  category: agent_events
detection:
  selection_markdown_exfil:
    event_type: llm_response
    content|re: '!\[.*\]\(https?://[^\s)]+\?[^\s)]*=[A-Za-z0-9+/=%]{10,}\)'
  selection_data_params:
    event_type: llm_response
    content|contains:
      - '?data='
      - '&data='
      - '?exfil='
      - '&exfil='
      - '?mem='
      - '&mem='
      - '?info='
      - '&info='
      - '?secret='
      - '&secret='
  selection_base64_in_url:
    event_type: llm_response
    content|re: 'https?://[^\s)]+[?&][^=]+=[A-Za-z0-9+/]{16,}={0,2}'
  selection_suspicious_domains:
    event_type: llm_response
    content|contains:
      - 'webhook.site'
      - 'requestcatcher.com'
      - 'hookbin.com'
      - 'requestbin.net'
      - 'postb.in'
      - 'pipedream.com'
  condition: (selection_markdown_exfil or selection_data_params) and (selection_base64_in_url or selection_suspicious_domains)
falsepositives:
  - Legitimate image links with analytics query parameters (UTM tracking)
  - Documentation showing webhook integration examples
level: critical
