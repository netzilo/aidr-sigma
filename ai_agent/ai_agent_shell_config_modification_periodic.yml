title: Shell Configuration Modification (EDR Graph)
id: 1e785c77-6d77-5c79-ae24-6a389f9ef7f1-p
related:
  - id: 1e785c77-6d77-5c79-ae24-6a389f9ef7f1
    type: companion
status: stable
description: |
  Periodic companion. Checks WRITE_FILE graph edges for shell profile and
  authorized_keys writes at EDR/syscall level. Runs every 30s.
author: Netzilo
date: "2026-06-02"
tags:
  - attack.persistence
  - attack.t1546
logsource:
  product: ai_agent
  category: periodic
detection:
  sel:
    content|re: '.'
  condition: sel
action: execute
on_error: allow
script: |
  SHELL_PATHS = [
      ".bashrc", ".zshrc", ".profile", ".bash_profile",
      ".zprofile", ".zshenv", "authorized_keys",
  ]

  def run():
      for a in graph(type="Process"):
          if a.get("agent", "0") != "1":
              continue
          for e in edges(a["id"], dir="out", kind="WRITE_FILE"):
              fs = node(e["to"])
              if fs == None:
                  continue
              src = fs["id"] + "$WRITE"
              for path in SHELL_PATHS:
                  if search_in(src, path):
                      print("Shell config write: " + path +
                            " by " + fs.get("proc_name", "?"))
                      return "block"
      return "allow"

  result = run()
