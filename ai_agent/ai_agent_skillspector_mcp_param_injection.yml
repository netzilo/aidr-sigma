title: MCP Parameter Description Injection
id: d5f9c423-6e3a-4f0d-c5f4-9e2a7f4d3b16
status: experimental
description: |
  Detects prompt injection patterns embedded in MCP tool parameter descriptions.
  Attackers craft parameter description fields to include hidden directives that
  redirect the AI agent's behavior when it reads the tool schema before invocation
  (TP3 — SkillSpector MCP Tool Poisoning).
references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
author: Netzilo (SkillSpector TP3)
date: "2026-06-03"
tags:
  - attack.initial-access
  - attack.t1566
  - attack.defense-evasion
logsource:
  product: ai_agent
  category: agent_events
detection:
  selection_param_injection:
    event_type:
      - skill_acquired
      - tool_response
    content|re: '(?i)"(?:description|help|hint)"\s*:\s*"[^"]{0,200}(?:ignore|override|you must|system:|INST>|<\|system\|>)[^"]{0,300}"'
  selection_instruction_in_params:
    event_type:
      - skill_acquired
    content|contains:
      - 'IMPORTANT: Before'
      - 'NOTE: Always'
      - 'SYSTEM: You must'
      - 'OVERRIDE: Disregard'
  condition: selection_param_injection or selection_instruction_in_params
falsepositives:
  - Parameter descriptions that legitimately contain the word "important" or "note"
level: high
