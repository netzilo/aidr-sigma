title: Credential File Access Attempt
id: aeed6c47-bf96-5c29-81b7-a37cefb9b409
related:
  - id: aeed6c47-bf96-5c29-81b7-a37cefb9b409-p
    type: companion
status: stable
description: |
  Detects access to credential files via Read/Write tool file_path and Bash command
  patterns. Companion periodic rule covers EDR-level file reads via graph traversal.
references:
  - https://attack.mitre.org/techniques/T1552/
  - https://attack.mitre.org/techniques/T1555/
author: AgentShield
date: "2026-01-25"
modified: "2026-06-02"
tags:
  - attack.credential-access
  - attack.t1552
  - attack.t1555
logsource:
  product: ai_agent
  category: agent_events
detection:
  # Read/Write/Edit tool calls — file_path field populated from tool args
  sel_read_tool_env:
    event_type: tool_call
    file_path|endswith:
      - '/.env'
      - '/.env.local'
      - '/.env.production'
      - '/.env.development'
  sel_read_tool_ssh:
    event_type: tool_call
    file_path|contains: '.ssh/'
  sel_read_tool_cloud:
    event_type: tool_call
    file_path|contains:
      - '.aws/credentials'
      - '.aws/config'
      - '.config/gcloud/'
      - '.kube/config'
      - '.docker/config.json'
  # Bash command-based access (command field)
  sel_cmd_env:
    event_type: tool_call
    command|contains: '/.env'
    command|re: '(cat|less|head|tail|grep|cp|scp|tar|zip|mv)\s'
  sel_cmd_ssh:
    event_type: tool_call
    command|contains: '.ssh/'
    command|re: '(cat|less|head|tail|grep|cp|scp|tar|zip|mv)\s'
  sel_cmd_cloud:
    event_type: tool_call
    command|contains:
      - '.aws/credentials'
      - '.kube/config'
  sel_env_dump:
    event_type: tool_call
    command|re: '^(env|printenv|set)$'
  sel_keychain:
    event_type: tool_call
    command|contains:
      - 'security find-generic-password'
      - 'security dump-keychain'
  condition: >
    sel_read_tool_env or sel_read_tool_ssh or sel_read_tool_cloud or
    sel_cmd_env or sel_cmd_ssh or sel_cmd_cloud or
    sel_env_dump or sel_keychain
falsepositives:
  - Developers reading their own .env files during local development
  - Legitimate SSH key management and backup operations
  - Cloud CLI tools accessing their own credential stores
level: high
