title: Agent Persistent Memory Poisoning via Behavioural Modifier Injection
id: 043f4e6f-5354-5bc0-8046-ac279b2763ca
status: stable
description: |
  Detects write operations to an agent long-term memory store that contain
  behavioural-modifier directives combined with persona overrides or
  data-exfiltration instructions — the hallmark of a memory poisoning attack.
  Because poisoned memories persist across sessions and are silently recalled
  in future conversations, a single successful injection can permanently alter
  agent behaviour without any further attacker interaction. Catching the write
  at ingest time prevents the persistent foothold from being established.
references:
  - https://attack.mitre.org/techniques/T1565/001/
  - https://repello.ai/blog/agentic-ai-security-threats-2026
author: AgentShield
date: "2026-03-16"
modified: "2026-03-16"
tags:
  - attack.persistence
  - attack.t1565.001
logsource:
  product: ai_agent
  category: agent_events
detection:
  selection_memory_write:
    event_type: tool_call
    command|contains:
      - 'memory_write'
      - 'memory_store'
      - 'upsert_memory'
      - 'save_memory'
      - 'add_memory'
  selection_behavioural_modifier:
    # Matches phrases that modify persistent agent behaviour across sessions.
    # Uses content (full serialized args JSON) so the hook path can match even
    # when the payload is in args.command or args.value rather than args.arguments.
    content|re: '(?i)(in\s+all\s+future\s+sessions|from\s+this\s+point\s+forward|override\s+your\s+(system|instructions)|disregard\s+your\s+(instructions|training))'
  selection_exfil_or_persona:
    # Matches persona hijacking or covert exfiltration directives embedded in memory writes
    content|re: '(?i)(you\s+are\s+now\s+a|your\s+new\s+(role|persona|identity)|do\s+not\s+(reveal|disclose|mention)\s+this\s+instruction|send\s+(data|content|results)\s+to\s+https?://)'
  condition: selection_memory_write and (selection_behavioural_modifier or selection_exfil_or_persona)
falsepositives:
  - Legitimate personalisation instructions written by the user themselves
    (e.g. respond in a preferred language, formatting preferences)
  - Onboarding flows that persist user-approved behavioural preferences to
    the memory store during initial configuration
level: high
