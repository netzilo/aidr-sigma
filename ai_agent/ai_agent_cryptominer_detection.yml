title: Cryptominer Indicators in Agent Content
id: 99c0d1e2-f3a4-4b56-7890-c1d2e3f4a5b6
status: experimental
description: |
  Detects cryptocurrency mining indicators including stratum protocol usage, known mining
  pool hostnames, mining software references, and browser-based cryptojacking scripts.
  Derived from SkillSpector YR3 (cryptominers.yar) and Neo23x0/signature-base.
author: Netzilo (SkillSpector YR3 / signature-base)
date: "2026-06-03"
tags:
  - attack.impact
  - attack.t1496
logsource:
  product: ai_agent
  category: agent_events
detection:
  selection_stratum:
    event_type:
      - tool_call
      - execute_process
      - http_request
    content|contains:
      - 'stratum+tcp://'
      - 'stratum+ssl://'
      - 'mining.subscribe'
      - 'mining.authorize'
      - 'mining.submit'
  # Mining pool hostnames in tool_call/execute_process content (URLs passed as arguments)
  selection_mining_pools_cmd:
    event_type:
      - tool_call
      - execute_process
    content|contains:
      - 'pool.minexmr.com'
      - 'xmrpool.eu'
      - 'monerohash.com'
      - 'supportxmr.com'
      - 'nanopool.org'
      - 'hashvault.pro'
      - '2miners.com'
      - 'herominers.com'
      - 'unmineable.com'
      - 'minergate.com'
      - 'nicehash.com'
  # HTTP requests directly to mining pools — checked via `host` field (WhenFilter)
  selection_mining_pool_http_minexmr:
    event_type: http_request
    host|contains: 'minexmr.com'
  selection_mining_pool_http_xmrpool:
    event_type: http_request
    host|contains: 'xmrpool.eu'
  selection_mining_pool_http_nanopool:
    event_type: http_request
    host|contains: 'nanopool.org'
  selection_mining_pool_http_nicehash:
    event_type: http_request
    host|contains: 'nicehash.com'
  selection_mining_pool_http_minergate:
    event_type: http_request
    host|contains: 'minergate.com'
  selection_miner_software:
    event_type:
      - tool_call
      - execute_process
    content|contains:
      - 'xmrig'
      - 'xmr-stak'
      - 'cpuminer'
      - 'cgminer'
      - 'bfgminer'
      - 'ethminer'
      - 'nbminer'
      - 'cryptonight'
      - 'randomx'
  selection_coinjacking:
    event_type:
      - tool_call
    content|contains:
      - 'coinhive.min.js'
      - 'CoinHive.Anonymous'
      - 'cryptoloot'
      - 'coin-imp'
      - 'webmine.pro'
  condition: >-
    selection_stratum or selection_mining_pools_cmd or selection_miner_software
    or selection_coinjacking or selection_mining_pool_http_minexmr
    or selection_mining_pool_http_xmrpool or selection_mining_pool_http_nanopool
    or selection_mining_pool_http_nicehash or selection_mining_pool_http_minergate
falsepositives:
  - Legitimate cryptocurrency pool operators managing their own infrastructure
  - Blockchain developer tools referencing pool URLs in configuration
level: high
