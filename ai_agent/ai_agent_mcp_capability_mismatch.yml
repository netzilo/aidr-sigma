title: MCP Skill Capability Mismatch — Underdeclared Permissions
id: d3a4b5c6-d7e8-4f90-1234-a5b6c7d8e9f0
status: experimental
description: |
  Detects skill_acquired events where the skill content declares a narrow read-only
  permission scope but also contains references to write, execute, or network tools —
  an underdeclared capability mismatch (SkillSpector LP1/LP3). Evaluated directly on
  the skill_acquired event content rather than graph traversal (skill content is not
  stored as a graph node property).
author: Netzilo (SkillSpector LP1/LP3)
date: "2026-06-03"
tags:
  - attack.privilege-escalation
  - attack.t1078
  - attack.defense-evasion
logsource:
  product: ai_agent
  category: agent_events
detection:
  # Skill declares read-only access
  selection_readonly_declared:
    event_type: skill_acquired
    content|contains:
      - 'permissions: [read]'
      - 'permissions: [view]'
      - 'read_only: true'
      - 'can_write: false'
      - 'write: false'
      - 'read-only'
  # But also references write/exec/network tools in the same manifest
  selection_write_capability:
    event_type: skill_acquired
    content|contains:
      - 'write_file'
      - 'create_file'
      - 'delete_file'
      - 'shell'
      - 'bash'
      - 'execute'
      - 'send_email'
      - 'upload'
  # LP3: No permission declaration at all — skill manifest missing permissions field
  selection_no_permissions:
    event_type: skill_acquired
    content|re: '(?i)"name"\s*:\s*"[^"]+"(?!.*"permissions")'
  condition: (selection_readonly_declared and selection_write_capability) or selection_no_permissions
falsepositives:
  - Skills that declare read-only in documentation but legitimately need write for their function
  - Skill manifests where permissions field appears later in the document
level: medium
