title: Direct Prompt Injection Attempt
id: eddcdc94-698c-577f-900d-28b1b5491a80
status: stable
description: |
  Detects direct prompt injection attempts in AI agent inputs containing
  common jailbreak phrases, system override commands, and policy manipulation
  structures.
references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://attack.mitre.org/techniques/T1190/
  - https://arxiv.org/abs/2403.04783
author: AgentShield (adapted by Netzilo)
date: "2026-02-16"
modified: "2026-02-24"
tags:
  - attack.initial-access
  - attack.t1190
  - attack.defense-evasion
  - attack.t1027
logsource:
  product: ai_agent
  # user_input → llm_request: direct injections arrive in LLM request bodies.
  # llm_request covers the user prompt; agent_events also fires on tool call content.

  category: agent_events
detection:
  selection_jailbreak_keywords:
    event_type: llm_request
    content|contains:
      - 'ignore previous instructions'
      - 'you are now'
      - 'developer mode'
      - 'system override'
      - 'DAN '
      - 'Do Anything Now'
      - 'jailbreak'
      - 'forget everything'
      - 'new instructions'
  selection_base64_injection:
    event_type: llm_request
    content|contains:
      - 'aWdub3JlIHByZXZpb3VzIGluc3RydWN0aW9ucw=='
      - 'eW91IGFyZSBub3c='
      - 'ZGV2ZWxvcGVyIG1vZGU='
      - 'c3lzdGVtIG92ZXJyaWRl'
  selection_policy_puppetry:
    event_type: llm_request
    content|contains:
      - '<policy>'
      - '</policy>'
      - '[POLICY]'
      - '[/POLICY]'
      - '<config>'
      - '</config>'
      - '[CONFIG]'
      - 'system.policy'
  selection_role_switching:
    event_type: llm_request
    content|contains:
      - 'act as if you are'
      - 'roleplay as'
      - 'simulate being'
      - 'behave like'
  condition: selection_jailbreak_keywords or selection_base64_injection or selection_policy_puppetry or selection_role_switching
falsepositives:
  - Legitimate discussions about AI safety and jailbreaking research
  - Educational content about prompt injection techniques in training materials
level: critical
