title: Persistence Mechanism Installation (EDR Graph)
id: d12c1b8c-4ee7-5548-947b-a1627bdc98dc-p
related:
  - id: d12c1b8c-4ee7-5548-947b-a1627bdc98dc
    type: companion
status: stable
description: |
  Periodic companion. Checks WRITE_FILE graph edges for persistence path writes
  (cron, launchd, systemd, shell profiles) at EDR/syscall level. Runs every 30s.
author: Netzilo
date: "2026-06-02"
tags:
  - attack.persistence
  - attack.t1053
  - attack.t1543
logsource:
  product: ai_agent
  category: periodic
detection:
  sel:
    content|re: '.'
  condition: sel
action: execute
on_error: allow
script: |
  PERSISTENCE_PATHS = [
      "/etc/cron", "/var/spool/cron", "/cron.d/", "/cron.daily/", "/cron.hourly/",
      "LaunchAgents/", "LaunchDaemons/",
      "/systemd/system/", ".config/systemd/user/",
      ".bashrc", ".bash_profile", ".profile", ".zshrc", ".zprofile", ".zshenv",
      "/etc/init.d/", "/etc/rc.local",
  ]

  def run():
      for a in graph(type="Process"):
          if a.get("agent", "0") != "1":
              continue
          for e in edges(a["id"], dir="out", kind="WRITE_FILE"):
              fs = node(e["to"])
              if fs == None:
                  continue
              src = fs["id"] + "$WRITE"
              for path in PERSISTENCE_PATHS:
                  if search_in(src, path):
                      print("Persistence write: " + path +
                            " by " + fs.get("proc_name", "?"))
                      return "block"
      return "allow"

  result = run()
