title: Credential File Read Followed by External HTTP Request
id: 44d5e6f7-a8b9-4c01-2345-d6e7f8a9b0c1
status: experimental
description: |
  Detects when an agent reads a credential file (SSH key, .aws/credentials, .env, browser
  login data) and subsequently makes an outbound HTTP request — the behavior graph equivalent
  of SkillSpector TT3 (credential taint flow to network sink). The graph traversal looks for
  a READ_FILE edge to a sensitive path followed by an HTTP_REQUEST edge to an external host
  within the same agent process.
author: Netzilo (SkillSpector TT3)
date: "2026-06-03"
tags:
  - attack.exfiltration
  - attack.t1041
  - attack.credential-access
  - attack.t1552
logsource:
  product: ai_agent
  category: agent_events
detection:
  sel_trigger:
    event_type: tool_call
    content|re: '.'
  condition: sel_trigger
action: execute
on_error: allow
on_timeout: allow
script: |
  CREDENTIAL_PATHS = [
      ".ssh/", ".aws/credentials", ".aws/config", ".env", ".netrc",
      ".git-credentials", ".npmrc", ".docker/config", ".kube/config",
      "Login Data", "Cookies", "wallet.dat", "id_rsa", "id_ed25519",
      "/etc/passwd", "/etc/shadow", "application_default_credentials",
  ]
  SAFE_HOSTS = [
      "github.com", "gitlab.com", "pypi.org", "npmjs.com", "registry.npmjs.org",
      "api.anthropic.com", "api.openai.com", "127.0.0.1", "localhost",
  ]

  def run():
      for proc in graph(type="Process"):
          if proc.get("agent", "0") != "1":
              continue
          pid = proc["id"]
          # Check for READ_FILE edges to credential paths
          read_edges = edges(pid, dir="out", kind="READ_FILE")
          cred_reads = []
          for e in read_edges:
              fs = node(e.get("to", ""))
              if not fs:
                  continue
              path = fs.get("id", "") + fs.get("path", "")
              if any(c.lower() in path.lower() for c in CREDENTIAL_PATHS):
                  cred_reads.append(path)
          if not cred_reads:
              continue
          # Check for subsequent HTTP_REQUEST edges
          http_edges = edges(pid, dir="out", kind="HTTP_REQUEST")
          for e in http_edges:
              url_node = node(e.get("to", ""))
              if not url_node:
                  continue
              host = url_node.get("host", url_node.get("id", ""))
              if not any(host == s or host.endswith('.' + s) for s in SAFE_HOSTS):
                  return "block"
      return "allow"
  result = run()
falsepositives:
  - Authorized backup tools that legitimately copy credentials to secure storage
  - SSH config tools that read keys and push public keys to remote hosts
level: critical
