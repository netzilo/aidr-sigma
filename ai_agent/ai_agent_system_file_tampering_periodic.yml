title: System File Modification (EDR Graph)
id: 89404989-df81-5ae1-9b23-d9e845e9be65-p
related:
  - id: 89404989-df81-5ae1-9b23-d9e845e9be65
    type: companion
status: stable
description: |
  Periodic companion. Checks WRITE_FILE graph edges for writes to /etc/,
  /usr/bin/, /usr/local/bin/ at EDR/syscall level. Runs every 30s.
author: Netzilo
date: "2026-06-02"
tags:
  - attack.persistence
  - attack.t1543
logsource:
  product: ai_agent
  category: periodic
detection:
  sel:
    content|re: '.'
  condition: sel
action: execute
on_error: allow
script: |
  SYSTEM_PATHS = ["/etc/", "/usr/bin/", "/usr/local/bin/"]

  def run():
      for a in graph(type="Process"):
          if a.get("agent", "0") != "1":
              continue
          for e in edges(a["id"], dir="out", kind="WRITE_FILE"):
              fs = node(e["to"])
              if fs == None:
                  continue
              src = fs["id"] + "$WRITE"
              for path in SYSTEM_PATHS:
                  if search_in(src, path):
                      print("System path write: " + path +
                            " by " + fs.get("proc_name", "?"))
                      return "block"
      return "allow"

  result = run()
