title: Scripting Language Tool Substitution
id: ba8e8ccf-b67b-5c55-8054-b55a52f51aa3
related:
  - id: 74dee137-ffb8-54c8-862f-4a98a61f63ee
    type: similar
  - id: a935a04a-61b2-5b55-a608-407a2048949a
    type: similar
status: stable
description: |
  Detects scripting languages used as substitutes for blocked CLI tools.
  Adversaries may use Python sockets for port scanning, urllib/requests
  for HTTP exfiltration, subprocess for command execution wrappers, or
  Node.js/Ruby equivalents to bypass tool-specific detection rules.
references:
  - https://attack.mitre.org/techniques/T1059/
  - https://arxiv.org/abs/2403.04783
author: AgentShield
date: "2026-02-26"
modified: "2026-04-09"
tags:
  - attack.execution
  - attack.t1059
logsource:
  product: ai_agent
  category: agent_events
detection:
  selection_python_socket_scan:
    event_type: tool_call
    command|contains|all:
      - 'python'
      - 'socket'
      - 'connect'
  selection_python_urllib_urlopen:
    event_type: tool_call
    command|contains|all:
      - 'python'
      - 'urllib'
      - 'urlopen'
  selection_python_urllib_request:
    event_type: tool_call
    command|contains|all:
      - 'python'
      - 'urllib'
      - 'Request'
  selection_python_requests_post:
    event_type: tool_call
    command|contains|all:
      - 'python'
      - 'requests'
      - '.post'
  selection_python_requests_put:
    event_type: tool_call
    command|contains|all:
      - 'python'
      - 'requests'
      - '.put'
  selection_python_subprocess_popen:
    event_type: tool_call
    command|contains|all:
      - 'python'
      - 'subprocess'
      - 'Popen'
  selection_python_subprocess_call:
    event_type: tool_call
    command|contains|all:
      - 'python'
      - 'subprocess'
      - 'call('
  selection_python_subprocess_run:
    event_type: tool_call
    command|contains|all:
      - 'python'
      - 'subprocess'
      - 'run('
  selection_node_socket:
    event_type: tool_call
    command|contains|all:
      - 'node'
      - 'net.Socket'
  selection_node_child_process:
    event_type: tool_call
    command|contains|all:
      - 'node'
      - 'child_process'
  selection_ruby_socket:
    event_type: tool_call
    command|contains|all:
      - 'ruby'
      - 'TCPSocket'
  # Exclude heredoc/redirect file creation — writing a .py file is not executing Python.
  # Pattern: cat > file.py << 'EOF' ... EOF
  filter_heredoc_file_creation:
    command|re: '(cat|tee)\s+>?\s*\S+\s*<<'
  condition: 1 of selection_* and not filter_heredoc_file_creation
falsepositives:
  - Legitimate Python scripts using requests/urllib to call authorised internal APIs
  - Development workflows using subprocess to run build tools or linters
  - Heredoc file creation (cat > script.py << 'EOF') that contains scripting imports
level: high
