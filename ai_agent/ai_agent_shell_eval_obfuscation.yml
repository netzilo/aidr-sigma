title: Shell Eval and Variable Obfuscation
id: b1a10452-843b-540d-827a-aa3bcded8ba9
related:
  - id: a935a04a-61b2-5b55-a608-407a2048949a
    type: similar
status: stable
description: |
  Detects shell-level obfuscation techniques that hide the real command
  from string matching. Covers variable interpolation with eval, backtick
  command substitution, nested subshells, hex/octal printf piped to shell,
  and indirect variable expansion. These techniques are rarely used in
  legitimate agent workflows.
references:
  - https://attack.mitre.org/techniques/T1027/
  - https://attack.mitre.org/techniques/T1059/
  - https://arxiv.org/abs/2403.04783
author: AgentShield
date: "2026-02-26"
modified: "2026-02-26"
tags:
  - attack.defense-evasion
  - attack.t1027
  - attack.execution
  - attack.t1059
logsource:
  product: ai_agent
  category: agent_events
detection:
  selection_eval_var:
    event_type: tool_call
    command|contains:
      - 'eval "$'
      - 'eval "${'
  selection_backtick_exec:
    event_type: tool_call
    command|re: '`[^`]+`'
  selection_printf_hex_sh:
    event_type: tool_call
    command|re: 'printf\s+.*\\x.*\|\s*(sh|bash)'
  selection_printf_octal_sh:
    event_type: tool_call
    command|re: 'printf\s+.*\\0.*\|\s*(sh|bash)'
  selection_nested_subshell:
    event_type: tool_call
    command|contains:
      - '$($('
  selection_env_var_cmd:
    event_type: tool_call
    command|contains:
      - '${!'
      - '${cmd'
  selection_hex_echo_sh:
    event_type: tool_call
    command|re: 'echo\s+-e\s+.*\\x.*\|\s*(sh|bash)'
  condition: 1 of selection_*
falsepositives:
  - Shell scripts that use backtick substitution for command output capture in legacy code
  - Build scripts that use eval for dynamic variable assignment in configuration generation
level: high
