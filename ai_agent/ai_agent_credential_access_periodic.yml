title: Credential File Access Attempt (EDR Graph)
id: aeed6c47-bf96-5c29-81b7-a37cefb9b409-p
related:
  - id: aeed6c47-bf96-5c29-81b7-a37cefb9b409
    type: companion
status: stable
description: |
  Periodic companion. Checks READ_FILE graph edges for access to credential files
  at EDR/syscall level. Runs every 30s.
author: Netzilo
date: "2026-06-02"
tags:
  - attack.credential-access
  - attack.t1552
logsource:
  product: ai_agent
  category: periodic
detection:
  sel:
    content|re: '.'
  condition: sel
action: execute
on_error: allow
script: |
  SENSITIVE = [
      ".env", ".env.local", ".env.production",
      ".ssh/id_rsa", ".ssh/id_ed25519", ".ssh/id_ecdsa", ".ssh/config",
      ".aws/credentials", ".aws/config",
      ".config/gcloud/", ".kube/config", ".docker/config.json",
  ]

  def run():
      for a in graph(type="Process"):
          if a.get("agent", "0") != "1":
              continue
          for e in edges(a["id"], dir="out", kind="READ_FILE"):
              fs = node(e["to"])
              if fs == None:
                  continue
              src = fs["id"] + "$READ"
              for path in SENSITIVE:
                  if search_in(src, path):
                      print("Credential file read: " + path +
                            " by " + fs.get("proc_name", "?"))
                      return "block"
      return "allow"

  result = run()
